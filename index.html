<!DOCTYPE html>
<html>
	<head>
		<title>drawring</title>
		<meta name="viewport" content="width = device-width, initial-scale = 1" />
		<link rel="stylesheet" href="style.css" type="text/css" />
		<script defer src="main.js" type="text/javascript"></script>
	</head>

	<body>
		<noscript>
			<b>javascript is <br /> required to use <br /> this webpage</b>
		</noscript>

		<div id="controls-division">
			<button id="draw-button">
				<!-- this should probably have a more descriptive label -->
				draw image
			</button>
			<button id="save-button">
				save image as&mldr;
			</button>

			<fieldset>
				<legend>
					RINGS:
				</legend>

				<label for="ring-count-input">
					number of rings
					<input id="ring-count-input" type="number"
					       min="0" max="9999" value="3000" />
				</label>

				<label for="ring-diameter-input">
					ring diameter
					<input id="ring-diameter-input" type="number"
					       min="0" max="1000" value="100" />
				</label>

				<label for="ring-thickness-input">
					ring thickness
					<input id="ring-thickness-input" type="number"
					       min="0" max="250" value="2" />
				</label>
			</fieldset>

			<fieldset>
				<legend>
					COLORS:
					<button id="color-swapper">
						swap colors
					</button>
				</legend>

				<label for="canvas-background-color-picker">
					background color
					<input id="canvas-background-color-picker" type="color"
					       value="#000000" />
				</label>

				<label for="ring-color-picker">
					ring color
					<input id="ring-color-picker" type="color"
					       value="#ffffff" />
				</label>
			</fieldset>

			<fieldset>
				<legend>
					IMAGE:
					<button id="canvas-width-height-swapper">
						<!-- TODO: also better label -->
						rotate 90&deg;
					</button>
				</legend>

				<label for="canvas-width-input">
					width
					<input id="canvas-width-input" type="number"
					       min="1" max="9999" value="1280" />
				</label>

				<label for="canvas-height-input">
					height
					<input id="canvas-height-input" type="number"
					       min="1" max="9999" value="720" />
				</label>

				<!-- i'm STILL not sure if changing the size of the canvas should affect the layout of the other ui -->
				<label for="preview-size-toggle">
					<!-- TODO: better label, this still kind of sucks -->
					fit to view
					<input id="preview-size-toggle" type="checkbox"
					       checked />
				</label>
			</fieldset>
		</div>

		<div id="canvas-division">
			<canvas id="canvas"></canvas>
		</div>
	</body>
</html>

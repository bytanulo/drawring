<!DOCTYPE html>
<html>
	<head>
		<title>rings</title>
		<link rel="stylesheet" href="style.css" type="text/css" />
		<script defer src="main.js" type="text/javascript"></script>
	</head>

	<body>
		<noscript>
			<b>javascript is <br /> required to use <br /> this webpage</b>
		</noscript>

		<div id="controls-division">
			<button id="draw-button">
				<!-- this should probably have a more descriptive label -->
				draw
			</button>

			<fieldset>
				<legend>
					RINGS:
				</legend>

				<label for="ring-count-input">
					number of rings
					<input type="number" id="ring-count-input" min="0" max="9999" />
				</label>

				<label for="ring-size-input">
					ring size
					<input type="number" id="ring-size-input" min="0" max="1000" />
				</label>

				<label for="ring-thickness-input">
					ring thickness
					<input type="number" id="ring-thickness-input" min="0" max="250" />
				</label>
			</fieldset>

			<fieldset>
				<legend>
					COLORS:
					<button id="color-swapper">
						swap colors
					</button>
				</legend>

				<label for="canvas-background-color-picker">
					background color
					<input type="color" id="canvas-background-color-picker" />
				</label>

				<label for="ring-color-picker">
					ring color
					<input type="color" id="ring-color-picker" />
				</label>
			</fieldset>

			<fieldset>
				<legend>
					IMAGE:
				</legend>

				<label for="canvas-width-input">
					width
					<input type="number" id="canvas-width-input" min="1" max="9999" />
				</label>

				<label for="canvas-height-input">
					height
					<input type="number" id="canvas-height-input" min="1" max="9999" />
				</label>

				<!-- i'm STILL not sure if changing the size of the canvas should affect the layout of the other ui -->
				<label for="preview-size-toggle">
					<!-- TODO: better label, this sucks -->
					preview size
					<input type="checkbox" id="preview-size-toggle" />
				</label>
			</fieldset>
		</div>

		<div id="canvas-division">
			<canvas id="canvas"></canvas>
		</div>
	</body>
</html>

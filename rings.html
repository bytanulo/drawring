<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>rings</title>
		<link rel="stylesheet" href="style.css" type="text/css" />
		<script defer src="main.js" type="text/javascript"></script>
	</head>
	<body class="flex-centered">
		<noscript>
			<b>javascript is <br /> required to use <br /> this webpage.</b>
		</noscript>

		<div>
			<div class="flex-centered">
				<canvas id="canvas" width="640" height="480"></canvas>
			</div>

			<div id="configuration-division-1" class="flex-horizontal flex-space-between">
				<div class="flex-horizontal">
					<!-- i'm not sure if changing the size of the canvas should affect the layout of the other ui -->
					<label>
						width:&nbsp;
						<input type="number" id="canvas-width-input" min="1" max="9999" />
					</label>
					<label>
						height:&nbsp;
						<input type="number" id="canvas-height-input" min="1" max="9999" />
					</label>
				</div>

				<button id="draw-button">
					<!-- this should probably have a more descriptive label -->
					draw
				</button>
			</div>

			<div class="flex-horizontal flex-space-between">
				<div class="flex-vertical">
					<label>
						<input type="color" id="canvas-background-color-picker" />
						&nbsp;background color
					</label>
					<label>
						<input type="color" id="ring-color-picker" />
						&nbsp;ring color
					</label>
					<button id="color-swapper">
						swap colors
					</button>
				</div>

				<div class="flex-vertical flex-right-aligned">
					<label>
						number of rings&nbsp;
						<input type="number" id="ring-count-input" min="0" max="9999" />
					</label>
					<label>
						ring size (in pixels)&nbsp;
						<input type="number" id="ring-size-input" min="0" max="1000" />
					</label>
					<label>
						ring thickness (in pixels)&nbsp;
						<input type="number" id="ring-thickness-input" min="0" max="250" />
					</label>
				</div>
			</div>
		</div>
	</body>
</html>
